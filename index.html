<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discourse | Prime Server</title>
    <style>
        /* UI Layout & Theme */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #313338; color: #dbdee1; overflow: hidden; 
        }
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar & Navigation */
        .server-bar { 
            width: 72px; background: #1e1f22; display: flex; 
            flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; flex-shrink: 0; 
        }
        .server-icon { 
            width: 48px; height: 48px; border-radius: 50%; background: #313338; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; overflow: hidden; color: white; font-weight: bold; 
        }
        .server-icon:hover { border-radius: 15px; background: #5865f2; }

        .channel-bar { width: 240px; background: #2b2d31; display: flex; flex-direction: column; flex-shrink: 0; }
        .channel-header { padding: 16px; font-weight: bold; color: white; border-bottom: 1px solid #1e1f22; }
        .channel-list { padding: 8px; flex-grow: 1; }
        .channel-item { 
            padding: 8px 12px; border-radius: 4px; color: #949ba4; 
            cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; 
        }
        .channel-item:before { content: "#"; margin-right: 8px; font-size: 20px; color: #5f636a; }
        .channel-item:hover { background: #35373c; color: #dbdee1; }
        .channel-item.active { background: #3f4147; color: white; }

        /* User Panel (Bottom Left) */
        .user-panel { 
            background: #232428; padding: 8px; display: flex; 
            align-items: center; gap: 10px; cursor: pointer; 
        }
        .user-panel:hover { background: #35373c; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #1e1f22; object-fit: cover; }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 13px; font-weight: bold; color: white; }
        .user-hash { font-size: 11px; color: #b5bac1; }

        /* Chat Window */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; background: #313338; position: relative; }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        
        .msg-row { 
            display: flex; padding: 2px 16px; width: 100%; 
            box-sizing: border-box; position: relative; flex-direction: column; 
        }
        .msg-row:hover { background: rgba(0,0,0,0.05); }
        .msg-row.first { margin-top: 14px; }
        .msg-flex { display: flex; width: 100%; }

        .avatar-col { width: 50px; flex-shrink: 0; }
        .msg-pfp { width: 40px; height: 40px; border-radius: 50%; margin-top: 4px; object-fit: cover; cursor: pointer; }
        .content-col { flex-grow: 1; min-width: 0; padding-left: 10px; }

        .msg-header { margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
        .username { color: white; font-weight: 500; font-size: 16px; cursor: pointer; }
        .timestamp { color: #949ba4; font-size: 12px; }
        .msg-text { color: #dbdee1; font-size: 15px; line-height: 1.4; word-break: break-word; }

        /* Input Styles */
        .input-wrapper { padding: 0 16px 24px; position: relative; }
        .input-box { 
            background: #383a40; padding: 10px 16px; border-radius: 8px; 
            display: flex; align-items: center; gap: 12px; 
        }
        .input-box input[type="text"] { 
            background: transparent; border: none; color: #dcddde; 
            flex-grow: 1; outline: none; font-size: 15px; 
        }

        /* Timeout UI State */
        .input-box.is-timeouted { 
            opacity: 0.5; pointer-events: none; 
            background: #212226; border: 1px solid #f23f42; 
        }
        .input-box.is-timeouted input[type="text"]::placeholder { 
            color: #f23f42; font-weight: bold; 
        }

        /* Member List Sidebar */
        .members-bar { width: 240px; background: #2b2d31; flex-shrink: 0; padding: 20px 8px; overflow-y: auto; }
        .member-header { color: #949ba4; text-transform: uppercase; font-size: 12px; font-weight: bold; margin-bottom: 12px; padding-left: 8px; }
        .member-item { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 4px; color: #949ba4; cursor: pointer; transition: 0.1s; }
        .member-item:hover { background: #35373c; color: #dbdee1; } 
        .member-item.offline { opacity: 0.5; }

        .member-avatar-wrapper { position: relative; width: 32px; height: 32px; }
        .member-avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 10px; height: 10px; background: #23a559; border-radius: 50%; border: 2px solid #2b2d31; } 
        .status-dot.offline { background: #80848e; }

        /* Overlays & Modals */
        #signup-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            display: none; justify-content: center; align-items: center; z-index: 2000; 
        }
        .signup-card { background: #313338; padding: 32px; border-radius: 8px; width: 340px; text-align: center; }

        /* Generic Helpers */
        .preview-bar { background: #2b2d31; padding: 8px 16px; border-radius: 8px 8px 0 0; display: none; align-items: center; justify-content: space-between; font-size: 13px; color: #b5bac1; margin-bottom: 2px; }
        .cancel-btn { cursor: pointer; color: #f23f42; font-weight: bold; }
        .chat-img { max-width: 100%; max-height: 350px; border-radius: 8px; margin: 6px 0; cursor: zoom-in; }
    </style>
</head>
<body>

<div id="signup-overlay">
    <div class="signup-card">
        <h2 style="color:white">Edit Profile</h2>
        <div style="display:flex; justify-content:center; gap:16px; margin-bottom:20px; align-items:center;">
            <img id="modal-avatar" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid #1e1f22;">
            <div style="display:flex; flex-direction:column; gap:8px;">
                <button onclick="randomizeAvatar()" style="padding:6px 12px; background:#4e5058; color:white; border:none; border-radius:4px; cursor:pointer;">🎲 Randomize</button>
                <label style="padding:6px 12px; background:#2b2d31; color:white; border:none; border-radius:4px; cursor:pointer; font-size:13px;">
                    📁 Upload <input type="file" accept="image/*" style="display:none;" onchange="handleAvatarUpload(this)">
                </label>
            </div>
        </div>
        <input type="text" id="modal-username" placeholder="Username" style="width:100%; padding:10px; margin-bottom:20px; background:#1e1f22; border:none; color:white; border-radius:4px;">
        <button onclick="saveProfile()" style="width:100%; padding:12px; background:#5865f2; border:none; color:white; border-radius:4px; font-weight:bold; cursor:pointer;">Save</button>
        <div id="cancel-profile-btn" onclick="document.getElementById('signup-overlay').style.display='none'" style="display:none; color:#949ba4; margin-top:15px; cursor:pointer;">Cancel</div>
    </div>
</div>

<div class="app-container">
    <div class="server-bar"><div class="server-icon">P</div></div>
    
    <div class="channel-bar">
        <div class="channel-header">Prime Server</div>
        <div class="channel-list">
            <div class="channel-item active" data-channel="welcome">welcome</div>
            <div class="channel-item" data-channel="general">general</div>
            <div class="channel-item" data-channel="feedback">feedback</div>
        </div>
        <div class="user-panel" onclick="openModal(true)">
            <img id="my-pfp" class="user-avatar">
            <div class="user-info">
                <div class="user-name" id="my-name">Guest</div>
                <div class="user-hash" id="my-hash">#0000</div>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-messages" id="message-container"></div>
        <div class="input-wrapper">
            <div id="attach-bar" class="preview-bar"><span>Image Attached</span><span class="cancel-btn" onclick="cancelAttachment()">✕</span></div>
            <div class="input-box" id="input-box-wrapper">
                <label style="color:#b5bac1; cursor:pointer; font-size:20px;">+<input type="file" id="file-upload" accept="image/*" style="display:none;" onchange="handleFileAsBase64(this)"></label>
                <input type="text" id="chat-input" placeholder="Message #welcome">
            </div>
        </div>
    </div>

    <div class="members-bar">
        <div class="member-header">Online — <span id="online-count">0</span></div>
        <div id="member-list-online"></div>
        <div class="member-header" style="margin-top: 16px;">Offline — <span id="offline-count">0</span></div>
        <div id="member-list-offline"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ovwvdfnilvedplhwzzjl.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FUPgy9ZRC9hrNfMUborCdQ_WF-pD5UP';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentChannel = 'welcome';
    let myUsername = localStorage.getItem('discordGuestName');
    let myAvatar = localStorage.getItem('discordGuestPfp');
    let userIsTimedOut = false;
    let timeoutInterval = null;
    let pendingAttachment = null;
    let livePfps = {};

    function isAdmin(u) { return u === 'githbprime#3951' || u === 'primealt#9047'; }
    function getUserClass(u) { return `avatar-${u.replace('#', '-')}`; }
    function getPfp(u) { return livePfps[u] || `https://api.dicebear.com/7.x/pixel-art/svg?seed=${u}`; }

    // --- MEMBER LIST & OFFLINE SYSTEM ---
    async function refreshMemberLists(presenceState) {
        const onlineUsernames = Object.keys(presenceState);
        const onlineList = document.getElementById('member-list-online');
        const offlineList = document.getElementById('member-list-offline');
        
        onlineList.innerHTML = '';
        onlineUsernames.forEach(uKey => {
            const pfp = presenceState[uKey][0].pfp || getPfp(uKey);
            livePfps[uKey] = pfp;
            const isAdm = isAdmin(uKey);
            onlineList.innerHTML += `
                <div class="member-item">
                    <div class="member-avatar-wrapper">
                        <img src="${pfp}" class="${getUserClass(uKey)}">
                        <div class="status-dot"></div>
                    </div>
                    <span style="color:${isAdm?'#ffcc00':'#dbdee1'}">${uKey.split('#')[0]}${isAdm?' 👑':''}</span>
                </div>`;
        });
        document.getElementById('online-count').innerText = onlineUsernames.length;

        // Fetch all users to find who is offline
        try {
            const { data: allUsers } = await db.from('Users').select('*');
            offlineList.innerHTML = '';
            let offCount = 0;
            if (allUsers) {
                allUsers.forEach(user => {
                    if (!onlineUsernames.includes(user.username)) {
                        const isAdm = isAdmin(user.username);
                        offlineList.innerHTML += `
                            <div class="member-item offline">
                                <div class="member-avatar-wrapper">
                                    <img src="${user.avatar_url}" style="filter: grayscale(100%); opacity: 0.6;">
                                    <div class="status-dot offline"></div>
                                </div>
                                <span style="color:${isAdm?'#a89020':'#747f8d'}">${user.username.split('#')[0]}${isAdm?' 👑':''}</span>
                            </div>`;
                        offCount++;
                    }
                });
            }
            document.getElementById('offline-count').innerText = offCount;
        } catch (e) { console.error("Offline fetch error", e); }
    }

    // --- TIMEOUT SYSTEM ---
    async function checkTimeouts() {
        const { data } = await db.from('Timeouts')
            .select('expires_at')
            .eq('target_user', myUsername)
            .order('expires_at', { ascending: false })
            .limit(1);
        
        if (data && data.length > 0) {
            const exp = new Date(data[0].expires_at).getTime();
            if (exp > Date.now()) {
                applyTimeoutUI(exp);
                return;
            }
        }
        clearTimeoutUI();
    }

    function applyTimeoutUI(exp) {
        userIsTimedOut = true;
        // Logic: Cannot edit profile while timed out
        document.getElementById('signup-overlay').style.display = 'none'; 
        
        const input = document.getElementById('chat-input');
        const box = document.getElementById('input-box-wrapper');
        box.classList.add('is-timeouted');
        input.disabled = true;

        clearInterval(timeoutInterval);
        timeoutInterval = setInterval(() => {
            const diff = exp - Date.now();
            if (diff <= 0) {
                clearTimeoutUI();
            } else {
                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                input.placeholder = `Timed out. ${m}:${s.toString().padStart(2, '0')} left.`;
            }
        }, 1000);
    }

    function clearTimeoutUI() {
        userIsTimedOut = false;
        clearInterval(timeoutInterval);
        document.getElementById('input-box-wrapper').classList.remove('is-timeouted');
        const input = document.getElementById('chat-input');
        input.disabled = false;
        input.placeholder = `Message #${currentChannel}`;
    }

    // --- PROFILE MANAGEMENT ---
    function openModal(isEdit = false) {
        if (isEdit && userIsTimedOut) {
            alert("You cannot edit your profile while timed out!");
            return;
        }
        document.getElementById('signup-overlay').style.display = 'flex';
        if (isEdit) {
            document.getElementById('modal-username').value = myUsername.split('#')[0];
            document.getElementById('modal-avatar').src = myAvatar;
            document.getElementById('cancel-profile-btn').style.display = 'block';
        } else {
            randomizeAvatar();
        }
    }

    async function saveProfile() {
        if (userIsTimedOut) {
            alert("Action blocked: You are currently timed out.");
            return;
        }
        const nameInput = document.getElementById('modal-username').value.trim();
        if (!nameInput) return;

        // Generate tag if new user
        const tag = myUsername ? myUsername.split('#')[1] : Math.floor(1000 + Math.random() * 9000);
        myUsername = nameInput + "#" + tag;
        myAvatar = document.getElementById('modal-avatar').src;

        localStorage.setItem('discordGuestName', myUsername);
        localStorage.setItem('discordGuestPfp', myAvatar);

        // Update database
        await db.from('Users').upsert({ username: myUsername, avatar_url: myAvatar });
        location.reload();
    }

    // --- MESSAGING ---
    async function sendMessage(val) {
        if (userIsTimedOut) return;
        
        let finalContent = val;
        if (pendingAttachment) finalContent += "[IMG]" + pendingAttachment;

        if (currentChannel === 'welcome') {
            const pass = isAdmin(myUsername) ? null : prompt("Admin Passcode:");
            await db.rpc('post_admin_message', { 
                passcode: pass, 
                p_username: myUsername, 
                p_content: finalContent, 
                p_channel: 'welcome' 
            });
        } else {
            await db.from('Messages').insert([{ 
                username: myUsername, 
                content: finalContent, 
                channel: currentChannel 
            }]);
        }
        cancelAttachment();
    }

    // --- CORE LOGIC & INIT ---
    async function initApp() {
        if (!myUsername) { openModal(false); return; }

        const isMeAdmin = isAdmin(myUsername);
        document.getElementById('my-name').innerHTML = `<span style="color:${isMeAdmin?'#ffcc00':'white'}">${myUsername.split('#')[0]}${isMeAdmin?' 👑':''}</span>`;
        document.getElementById('my-hash').innerText = '#' + (myUsername.split('#')[1] || '0000');
        document.getElementById('my-pfp').src = myAvatar;

        // Sync presence
        const pres = db.channel('online_users', { config: { presence: { key: myUsername } } });
        pres.on('presence', { event: 'sync' }, () => refreshMemberLists(pres.presenceState()))
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') await pres.track({ pfp: myAvatar });
            });

        // Listen for new messages
        db.channel('msgs').on('postgres_changes', { event: '*', schema: 'public', table: 'Messages' }, () => loadMessages()).subscribe();

        // Listen for timeouts (FIXED: No filter in the filter string to avoid '#' issues)
        db.channel('timeouts').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'Timeouts' }, (payload) => {
            if (payload.new.target_user === myUsername) {
                const exp = new Date(payload.new.expires_at).getTime();
                if (exp > Date.now()) applyTimeoutUI(exp);
            }
        }).subscribe();

        loadMessages();
        checkTimeouts();
    }

    async function loadMessages() {
        const container = document.getElementById('message-container');
        container.innerHTML = '';
        const { data } = await db.from('Messages').select('*').eq('channel', currentChannel).order('created_at', { ascending: true });
        if (data) data.forEach(m => renderMessage(m));
        container.scrollTop = container.scrollHeight;
    }

    function renderMessage(m) {
        const container = document.getElementById('message-container');
        const isAdm = isAdmin(m.username);
        let content = m.content || "";
        let imgSrc = null;
        if (content.includes('[IMG]')) {
            const parts = content.split('[IMG]');
            content = parts[0];
            imgSrc = parts[1];
        }

        const row = document.createElement('div');
        row.className = 'msg-row first';
        row.innerHTML = `
            <div class="msg-flex">
                <div class="avatar-col"><img src="${getPfp(m.username)}" class="msg-pfp"></div>
                <div class="content-col">
                    <div class="msg-header">
                        <span class="username" style="color:${isAdm?'#ffcc00':''}">${m.username.split('#')[0]}${isAdm?' 👑':''}</span>
                        <span class="timestamp">${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div class="msg-text">${content}</div>
                    ${imgSrc ? `<img src="${imgSrc}" class="chat-img">` : ''}
                </div>
            </div>`;
        container.appendChild(row);
    }

    // --- UTILITIES ---
    function randomizeAvatar() {
        document.getElementById('modal-avatar').src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${Math.random()}`;
    }

    function handleAvatarUpload(input) {
        const reader = new FileReader();
        reader.onload = e => document.getElementById('modal-avatar').src = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }

    function handleFileAsBase64(input) {
        const reader = new FileReader();
        reader.onload = e => {
            pendingAttachment = e.target.result;
            document.getElementById('attach-bar').style.display = 'flex';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function cancelAttachment() { 
        pendingAttachment = null; 
        document.getElementById('attach-bar').style.display = 'none'; 
    }

    document.getElementById('chat-input').onkeypress = (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value.trim();
            if (val.startsWith('/timeout ')) {
                const pts = val.split(' ');
                if (isAdmin(myUsername) && pts.length >= 3) {
                    const exp = new Date(Date.now() + parseInt(pts[2]) * 60000).toISOString();
                    db.from('Timeouts').insert([{ target_user: pts[1], expires_at: exp, issued_by: myUsername }]);
                }
            } else if (val || pendingAttachment) {
                sendMessage(val);
            }
            e.target.value = '';
        }
    };

    document.querySelectorAll('.channel-item').forEach(el => {
        el.onclick = () => {
            document.querySelectorAll('.channel-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentChannel = el.dataset.channel;
            loadMessages();
        }
    });

    initApp();
</script>
</body>
</html>>
